@version: 4.8
@include "scl.conf"

options {
    keep-hostname(yes);
    use-dns(no);
};

# --- Sources: no-parse keeps the raw UDP payload intact in ${MSG} ---

source s_app            { udp(ip(0.0.0.0) port(5514) flags(no-parse)); };
source s_siem          { udp(ip(0.0.0.0) port(5515) flags(no-parse)); };
source s_public_inspect { udp(ip(0.0.0.0) port(5516) flags(no-parse)); };
source s_debug         { udp(ip(0.0.0.0) port(5517) flags(no-parse)); };

# Strip the syslog PRI prefix (<N>) that Python's SysLogHandler prepends ---

rewrite r_strip_pri {
    subst("^<[0-9]{1,3}>", "", value("MSG"));
};

# --- Destinations ---

destination d_app {
    file("/var/log/app/app.log" template("${MSG}\n") perm(0644));
};

destination d_siem {
    file("/var/log/app/siem.log" template("${MSG}\n") perm(0644));
};

destination d_public_inspect {
    file("/var/log/app/public_inspect.log" template("${MSG}\n") perm(0644));
};

destination d_debug {
    file("/var/log/app/debug.log" template("${MSG}\n") perm(0644));
};

# --- Routes ---

log { source(s_app);           rewrite(r_strip_pri); destination(d_app); };
log { source(s_siem);           rewrite(r_strip_pri); destination(d_siem); };
log { source(s_public_inspect); rewrite(r_strip_pri); destination(d_public_inspect); };
log { source(s_debug);          rewrite(r_strip_pri); destination(d_debug); };
